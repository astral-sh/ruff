[tool.ruff]
select = [
    "F401",
    "unused-import",
    "F",
]
extend-select = ['F841']
fixable = ["""E501"""]
extend-fixable = ['''UP035''']
ignore = ["F401"]
extend-ignore = ["F841"]
per-file-ignores = { "foo.py" = ["E501"] }
extend-per-file-ignores = { "bar.py" = ["UP035"] }
unfixable = ["F401"]
extend-unfixable = ["F841"]
extend-safe-fixes = ["E501"]
extend-unsafe-fixes = ["UP035"]

[tool.ruff.lint]
select = [
    "F401",
    "unused-import",
    "unknown-rule",
]
extend-select = ['F841']
fixable = ["""E501"""]
extend-fixable = ['''UP035''']
ignore = ["F401"]
extend-ignore = ["F841"]
per-file-ignores = { "foo.py" = ["E501"] }
extend-per-file-ignores = { "bar.py" = ["UP035"] }
unfixable = ["F401"]
extend-unfixable = ["F841"]
extend-safe-fixes = ["E501"]
extend-unsafe-fixes = ["UP035"]
