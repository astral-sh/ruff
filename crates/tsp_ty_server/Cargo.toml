[package]
name = "tsp_ty_server"
version = "0.0.0"
publish = false
authors = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
homepage = { workspace = true }
documentation = { workspace = true }
repository = { workspace = true }
license = { workspace = true }
description = "TSP (Type Server Protocol) wrapper for ty_server"

[[bin]]
name = "tsp-ty"
path = "src/main.rs"

[dependencies]
tsp_types = { path = "../tsp_types" }
ty_server = { workspace = true }
ty_project = { workspace = true }
ty_module_resolver = { workspace = true }
ty_ide = { workspace = true }
ty_vendored = { workspace = true }

ruff_db = { workspace = true, features = ["os"] }
ruff_source_file = { workspace = true }
ruff_text_size = { workspace = true }

anyhow = { workspace = true }
lsp-server = { workspace = true }
lsp-types = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tempfile = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
insta = { workspace = true, features = ["json"] }

[lints]
workspace = true
