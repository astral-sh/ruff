<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ty coverage</title>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ty documentation colour palette */
      :root {
        --galaxy: #261230;
        --space: #30173d;
        --radiate: #d7ff64;
        --nebula: #cdcbfb;
        --starlight: #f4f4f1;
        --lunar: #fbf2fc;
        --flare: #6340ac;
        --aurora: #46eb74;
        --sun: #ffac2f;
        --proton: #f6afbc;
        --cosmic: #de5fe9;
        --comet: #6f5d6f;
        --constellation: #5f6de9;
        --bg: var(--galaxy);
        --bg-panel: var(--space);
        --bg-hover: rgba(99, 64, 172, 0.25);
        --bg-active: rgba(99, 64, 172, 0.45);
        --border: rgba(205, 203, 251, 0.15);
        --text: var(--starlight);
        --text-dim: var(--nebula);
        --text-bright: #ffffff;
        --accent: var(--radiate);
        --scrollbar-thumb: rgba(205, 203, 251, 0.2);
        /* Line category RGB channels (for rgba() fills and pips) */
        --ty-precise-rgb: 70, 235, 116;
        --ty-imprecise-rgb: 255, 172, 47;
        --ty-dynamic-rgb: 222, 95, 233;
        --ty-todo-rgb: 95, 109, 233;
        --ty-empty-rgb: 111, 93, 111;
        --ty-line-fill-alpha: 0.3;
        --ty-pip-alpha: 0.85;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      /* ── Layout ── */
      .layout {
        display: flex;
        flex: 1;
        overflow: hidden;
      }
      /* ── Sidebar ── */
      .sidebar {
        width: 280px;
        min-width: 200px;
        background: var(--bg-panel);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .sidebar-header {
        padding: 14px 16px 10px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: var(--text-dim);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .tree {
        flex: 1;
        overflow-y: auto;
        padding: 6px 0;
      }
      .tree::-webkit-scrollbar {
        width: 6px;
      }
      .tree::-webkit-scrollbar-track {
        background: transparent;
      }
      .tree::-webkit-scrollbar-thumb {
        background: var(--scrollbar-thumb);
        border-radius: 3px;
      }
      /* ── Tree nodes ── */
      .tree-item {
        display: flex;
        align-items: center;
        padding: 5px 12px;
        cursor: pointer;
        user-select: none;
        transition: background 0.12s;
        gap: 6px;
        font-size: 13.5px;
        white-space: nowrap;
      }
      .tree-item:hover {
        background: var(--bg-hover);
      }
      .tree-item.active {
        background: var(--bg-active);
        color: var(--accent);
      }
      .tree-item .chevron {
        width: 16px;
        height: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        color: var(--text-dim);
        transition: transform 0.2s ease;
        flex-shrink: 0;
      }
      .tree-item .chevron.open {
        transform: rotate(90deg);
      }
      .tree-item .chevron.hidden {
        visibility: hidden;
      }
      .tree-item .icon {
        font-size: 15px;
        flex-shrink: 0;
        width: 18px;
        text-align: center;
      }
      .tree-item .label {
        font-weight: 500;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
      }
      .tree-item .badge {
        font-size: 10px;
        font-family: "IBM Plex Mono", monospace;
        padding: 1px 5px;
        border-radius: 3px;
        flex-shrink: 0;
      }
      .tree-children {
        overflow: hidden;
      }
      .tree-children.collapsed {
        display: none;
      }
      @keyframes fadeSlide {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      /* ── Sidebar summary button ── */
      .summary-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px 8px 16px;
        font-size: 13.5px;
        font-weight: 500;
        cursor: pointer;
        user-select: none;
        border-bottom: 1px solid var(--border);
        color: var(--text-dim);
        transition:
          background 0.12s,
          color 0.12s;
        flex-shrink: 0;
      }
      .summary-btn:hover {
        background: var(--bg-hover);
        color: var(--text);
      }
      .summary-btn.active {
        background: var(--bg-active);
        color: var(--accent);
      }
      .tree-children:not(.collapsed) > .tree-node {
        animation: fadeSlide 0.15s ease forwards;
      }
      /* ── Main area ── */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--bg);
      }
      /* ── Tabs ── */
      .tabs {
        display: flex;
        background: var(--bg-panel);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        overflow-x: auto;
        min-height: 38px;
      }
      .tabs::-webkit-scrollbar {
        height: 0;
      }
      .tab {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 16px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 12.5px;
        color: var(--text-dim);
        border-right: 1px solid var(--border);
        cursor: pointer;
        white-space: nowrap;
        transition:
          background 0.15s,
          color 0.15s;
        position: relative;
      }
      .tab:hover {
        background: var(--bg-hover);
        color: var(--text);
      }
      .tab.active {
        color: var(--text-bright);
        background: var(--bg);
      }
      .tab.active::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: var(--accent);
      }
      .tab .close {
        opacity: 0;
        font-size: 14px;
        line-height: 1;
        margin-left: 4px;
        transition: opacity 0.15s;
      }
      .tab:hover .close {
        opacity: 0.7;
      }
      .tab .close:hover {
        opacity: 1;
      }
      /* ── Content area ── */
      #content-area {
        flex: 1;
        overflow: auto;
      }
      #content-area::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      #content-area::-webkit-scrollbar-track {
        background: transparent;
      }
      #content-area::-webkit-scrollbar-thumb {
        background: var(--scrollbar-thumb);
        border-radius: 4px;
      }
      /* ── Breadcrumb ── */
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 20px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 12px;
        color: var(--text-dim);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .breadcrumb-path {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .breadcrumb span {
        color: var(--accent);
      }
      /* ── Source table ── */
      table.source {
        border-collapse: collapse;
        width: 100%;
      }
      table.source tr {
        line-height: 1.6;
      }
      td.lineno {
        font-family: "IBM Plex Mono", monospace;
        font-size: 13px;
        text-align: right;
        padding: 0 10px 0 16px;
        width: 1%;
        white-space: nowrap;
        user-select: none;
        border-right: 1px solid var(--border);
        color: #a897ab;
        vertical-align: top;
      }
      td.lineno a {
        color: inherit;
        text-decoration: none;
      }
      td.lineno a:hover {
        color: var(--text);
        text-decoration: underline;
      }
      td.code {
        font-family: "IBM Plex Mono", monospace;
        font-size: 13px;
        color: #e8e0ea;
        padding: 0 16px;
        white-space: pre;
        tab-size: 4;
        flex: 1;
        min-width: 0;
      }
      /* ── Coverage line fills and gutter pips ── */
      tr.line-precise td {
        background: rgba(var(--ty-precise-rgb), var(--ty-line-fill-alpha));
      }
      tr.line-imprecise td {
        background: rgba(var(--ty-imprecise-rgb), var(--ty-line-fill-alpha));
      }
      tr.line-dynamic td {
        background: rgba(var(--ty-dynamic-rgb), var(--ty-line-fill-alpha));
      }
      tr.line-todo td {
        background: rgba(var(--ty-todo-rgb), var(--ty-line-fill-alpha));
      }
      tr.line-empty td {
        background: rgba(var(--ty-empty-rgb), var(--ty-line-fill-alpha));
      }
      /* Gutter pip: override the lineno right-border with a solid colour bar */
      tr.line-precise td.lineno {
        border-right: 3px solid rgba(var(--ty-precise-rgb), var(--ty-pip-alpha));
      }
      tr.line-imprecise td.lineno {
        border-right: 3px solid
          rgba(var(--ty-imprecise-rgb), var(--ty-pip-alpha));
      }
      tr.line-dynamic td.lineno {
        border-right: 3px solid rgba(var(--ty-dynamic-rgb), var(--ty-pip-alpha));
      }
      tr.line-todo td.lineno {
        border-right: 3px solid rgba(var(--ty-todo-rgb), var(--ty-pip-alpha));
      }
      tr.line-empty td.lineno {
        border-right: 3px solid
          rgba(var(--ty-empty-rgb), var(--ty-pip-alpha));
      }
      /* ── Quality colours (text + tinted backgrounds) ── */
      .q0 {
        color: var(--aurora);
      }
      .q1 {
        color: var(--sun);
      }
      .q2 {
        color: var(--proton);
      }
      /* Quality backgrounds for tree badges */
      .tree-item .badge.q0 {
        background: rgba(70, 235, 116, 0.18);
      }
      .tree-item .badge.q1 {
        background: rgba(255, 172, 47, 0.18);
      }
      .tree-item .badge.q2 {
        background: rgba(246, 175, 188, 0.18);
      }
      /* Quality row tints for summary table */
      table.summary tbody tr.summary-quality-0 td {
        background: rgba(var(--ty-precise-rgb), 0.12);
      }
      table.summary tbody tr.summary-quality-1 td {
        background: rgba(var(--ty-imprecise-rgb), 0.12);
      }
      table.summary tbody tr.summary-quality-2 td {
        background: rgba(var(--ty-dynamic-rgb), 0.12);
      }
      .stat-badge {
        font-family: "IBM Plex Mono", monospace;
        font-size: 11px;
        padding: 3px 8px;
        border-radius: 4px;
        white-space: nowrap;
      }
      /* Stat badge backgrounds use the same vars as the line fills for visual consistency */
      .sb-precise {
        background: rgba(var(--ty-precise-rgb), var(--ty-line-fill-alpha));
        color: #ffffff;
      }
      .sb-imprecise {
        background: rgba(var(--ty-imprecise-rgb), var(--ty-line-fill-alpha));
        color: #ffffff;
      }
      .sb-dynamic {
        background: rgba(var(--ty-dynamic-rgb), var(--ty-line-fill-alpha));
        color: #ffffff;
      }
      .sb-todo {
        background: rgba(var(--ty-todo-rgb), var(--ty-line-fill-alpha));
        color: #ffffff;
      }
      .sb-empty {
        background: rgba(var(--ty-empty-rgb), var(--ty-line-fill-alpha));
        color: #ffffff;
      }
      /* ── Summary table ── */
      .summary-wrap {
        padding: 24px 32px;
      }
      table.summary {
        border-collapse: collapse;
        width: 100%;
        font-family: "DM Sans", sans-serif;
        font-size: 13px;
      }
      table.summary thead th {
        text-align: left;
        padding: 7px 12px;
        border: 1px solid var(--border);
        background: var(--bg-panel);
        color: var(--text-dim);
        white-space: nowrap;
        font-weight: 600;
        font-size: 12px;
      }
      table.summary thead th.col-num {
        text-align: right;
      }
      table.summary tbody tr {
        cursor: pointer;
      }
      table.summary tbody tr:hover td {
        filter: brightness(1.2);
      }
      table.summary td {
        padding: 6px 12px;
        border: 1px solid var(--border);
        background: var(--bg-panel);
      }
      table.summary tfoot td {
        padding: 6px 12px;
        border: 1px solid var(--border);
        background: var(--bg-active);
        font-weight: 600;
      }
      .col-file {
        text-align: left;
      }
      .col-num {
        text-align: right;
        font-family: "IBM Plex Mono", monospace;
        font-size: 12px;
      }
      td.col-file a {
        color: inherit;
        text-decoration: none;
      }
      td.col-file a:hover {
        color: var(--accent);
        text-decoration: underline;
      }
      /* ── Status bar ── */
      .statusbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 4px 16px;
        background: var(--bg-panel);
        border-top: 1px solid var(--border);
        font-family: "IBM Plex Mono", monospace;
        font-size: 11px;
        color: var(--text-dim);
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="sidebar">
        <div class="sidebar-header">ty coverage</div>
        <div class="summary-btn" id="summary-btn" onclick="showSummary()">
          File Summary
        </div>
        <div class="tree" id="tree"></div>
      </div>
      <div class="main">
        <div class="tabs" id="tabs"></div>
        <div id="content-area"></div>
      </div>
    </div>
    <div class="statusbar">
      <span id="status-left">Ready</span>
      <span id="status-right"></span>
    </div>
    <script>
      // Sentinel replaced at report generation time with real JSON coverage data.
      // See `write_html_report` in html.rs.
      const COVERAGE_DATA = [];

      function qualityClass(pct) {
        return pct < 5 ? "q0" : pct < 20 ? "q1" : "q2";
      }

      function summaryQualityClass(pct) {
        return pct < 5
          ? "summary-quality-0"
          : pct < 20
            ? "summary-quality-1"
            : "summary-quality-2";
      }

      // Returns "N (X%)" — matches the ASCII table format from `fmt_count_pct` in lib.rs.
      function fmtCountPct(count, total) {
        if (total === 0) return count + " (0%)";
        return count + " (" + Math.round((count / total) * 100) + "%)";
      }

      // Returns per-category line counts and percentages for a file.
      function lineStats(f) {
        const counts = [0, 0, 0, 0, 0]; // 0=empty 1=precise 2=imprecise 3=dynamic 4=todo
        f.line_classes.forEach(function (c) {
          counts[c]++;
        });
        const total = f.line_classes.length;
        function p(n) {
          return total ? (n / total) * 100 : 0;
        }
        return {
          total: total,
          empty: counts[0],
          precise: counts[1],
          imprecise: counts[2],
          dynamic: counts[3],
          todo: counts[4],
          pct: {
            precise: p(counts[1]),
            imprecise: p(counts[2]),
            dynamic: p(counts[3]),
            todo: p(counts[4]),
            empty: p(counts[0]),
            // Combined (imprecise + dynamic) — used for quality tier and sidebar badge.
            combined: p(counts[2] + counts[3]),
          },
        };
      }

      function escHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      // Build nested tree object from flat files array.
      // Leaves are integer indices into COVERAGE_DATA.files.
      // Directories are plain objects.

      function buildCoverageTree(files) {
        const root = {};
        files.forEach(function (f, idx) {
          const parts = f.path.split("/");
          let node = root;
          for (let i = 0; i < parts.length - 1; i++) {
            if (typeof node[parts[i]] !== "object" || node[parts[i]] === null) {
              node[parts[i]] = {};
            }
            node = node[parts[i]];
          }
          node[parts[parts.length - 1]] = idx;
        });
        return root;
      }

      const TREE = buildCoverageTree(COVERAGE_DATA.files);
      let openTabs = []; // array of file indices
      let activeView = null; // 'summary' | number (file index)
      const expandedDirs = new Set();

      function renderTreeNode(obj, parentPath, depth) {
        const container = document.createDocumentFragment();

        const entries = Object.entries(obj).sort(function (a, b) {
          const aDir = typeof a[1] === "object" ? 0 : 1;
          const bDir = typeof b[1] === "object" ? 0 : 1;
          return aDir - bDir || a[0].localeCompare(b[0]);
        });

        entries.forEach(function (entry) {
          const name = entry[0],
            value = entry[1];
          const fullPath = parentPath ? parentPath + "/" + name : name;
          const isDir = typeof value === "object" && value !== null;

          const node = document.createElement("div");
          node.className = "tree-node";

          const item = document.createElement("div");
          item.className = "tree-item";
          item.style.paddingLeft = 12 + depth * 16 + "px";
          item.dataset.path = fullPath;

          const chevron = document.createElement("span");
          chevron.className =
            "chevron" +
            (isDir ? (expandedDirs.has(fullPath) ? " open" : "") : " hidden");
          chevron.textContent = "▶";

          const icon = document.createElement("span");
          icon.className = "icon";

          const label = document.createElement("span");
          label.className = "label";
          label.textContent = name;

          if (isDir) {
            icon.textContent = expandedDirs.has(fullPath) ? "📂" : "📁";
            icon.style.color = "var(--folder)";
            item.append(chevron, icon, label);
          } else {
            icon.textContent = "🐍";
            icon.style.color = "var(--file-py, #4b8bbe)";
            const f = COVERAGE_DATA.files[value];
            const ls = lineStats(f);
            const badge = document.createElement("span");
            const q = qualityClass(ls.pct.combined);
            badge.className = "badge " + q;
            badge.textContent = ls.pct.combined.toFixed(1) + "%";
            item.append(chevron, icon, label, badge);
          }

          node.appendChild(item);

          if (isDir) {
            const children = document.createElement("div");
            children.className =
              "tree-children" +
              (expandedDirs.has(fullPath) ? "" : " collapsed");
            children.appendChild(renderTreeNode(value, fullPath, depth + 1));
            node.appendChild(children);

            item.addEventListener("click", function () {
              const isOpen = expandedDirs.has(fullPath);
              if (isOpen) expandedDirs.delete(fullPath);
              else expandedDirs.add(fullPath);
              chevron.classList.toggle("open", !isOpen);
              children.classList.toggle("collapsed", isOpen);
              icon.textContent = isOpen ? "📁" : "📂";
            });
          } else {
            const idx = value;
            item.addEventListener("click", function () {
              openFile(idx);
            });
          }

          container.appendChild(node);
        });
        return container;
      }

      function renderTabs() {
        const tabsEl = document.getElementById("tabs");
        tabsEl.innerHTML = "";

        openTabs.forEach(function (idx) {
          const f = COVERAGE_DATA.files[idx];
          const name = f.path.split("/").pop();
          const tab = document.createElement("div");
          tab.className = "tab" + (activeView === idx ? " active" : "");

          const lbl = document.createElement("span");
          lbl.textContent = name;

          const close = document.createElement("span");
          close.className = "close";
          close.textContent = "×";
          close.addEventListener("click", function (e) {
            e.stopPropagation();
            closeTab(idx);
          });

          tab.append(lbl, close);
          tab.addEventListener("click", function () {
            openFile(idx);
          });
          tabsEl.appendChild(tab);
        });
      }

      function showSummary() {
        activeView = "summary";
        document.getElementById("summary-btn").classList.add("active");
        renderTabs();

        const files = COVERAGE_DATA.files;
        const showTodo = COVERAGE_DATA.show_todo;

        let totLines = 0,
          totPrecise = 0,
          totImprecise = 0,
          totDynamic = 0,
          totTodo = 0,
          totEmpty = 0;
        files.forEach(function (f) {
          const ls = lineStats(f);
          totLines += ls.total;
          totPrecise += ls.precise;
          totImprecise += ls.imprecise;
          totDynamic += ls.dynamic;
          totTodo += ls.todo;
          totEmpty += ls.empty;
        });

        let html =
          '<div class="summary-wrap"><table class="summary"><thead><tr>';
        html += '<th class="col-file">File</th>';
        html += '<th class="col-num">Lines</th>';
        html += '<th class="col-num">Precise</th>';
        html += '<th class="col-num">Imprecise</th>';
        html += '<th class="col-num">Dynamic</th>';
        if (showTodo) html += '<th class="col-num">Todo</th>';
        html += '<th class="col-num">Empty</th>';
        html += "</tr></thead><tbody>";

        files.forEach(function (f, idx) {
          const ls = lineStats(f);
          const q = summaryQualityClass(ls.pct.combined);
          html +=
            '<tr class="' +
            q +
            '" data-idx="' +
            idx +
            '" style="cursor:pointer">';
          html +=
            '<td class="col-file"><a href="#file-' +
            idx +
            '" onclick="event.preventDefault()">' +
            escHtml(f.path) +
            "</a></td>";
          html += '<td class="col-num">' + ls.total + "</td>";
          html += '<td class="col-num">' + fmtCountPct(ls.precise, ls.total) + "</td>";
          html += '<td class="col-num">' + fmtCountPct(ls.imprecise, ls.total) + "</td>";
          html += '<td class="col-num">' + fmtCountPct(ls.dynamic, ls.total) + "</td>";
          if (showTodo) html += '<td class="col-num">' + fmtCountPct(ls.todo, ls.total) + "</td>";
          html += '<td class="col-num">' + fmtCountPct(ls.empty, ls.total) + "</td>";
          html += "</tr>";
        });

        html += "</tbody><tfoot><tr>";
        html += '<td class="col-file"><strong>Total</strong></td>';
        html += '<td class="col-num">' + totLines + "</td>";
        html += '<td class="col-num">' + fmtCountPct(totPrecise, totLines) + "</td>";
        html += '<td class="col-num">' + fmtCountPct(totImprecise, totLines) + "</td>";
        html += '<td class="col-num">' + fmtCountPct(totDynamic, totLines) + "</td>";
        if (showTodo)
          html += '<td class="col-num">' + fmtCountPct(totTodo, totLines) + "</td>";
        html += '<td class="col-num">' + fmtCountPct(totEmpty, totLines) + "</td>";
        html += "</tr></tfoot></table></div>";

        const area = document.getElementById("content-area");
        area.innerHTML = html;

        // Attach row click handlers.
        area.querySelectorAll("tbody tr[data-idx]").forEach(function (row) {
          row.addEventListener("click", function () {
            openFile(parseInt(row.dataset.idx, 10));
          });
        });

        updateStatus("Coverage Summary", files.length + " files");
        history.replaceState(null, "", "#summary");
      }

      function openFile(idx) {
        if (!openTabs.includes(idx)) openTabs.push(idx);
        activeView = idx;
        document.getElementById("summary-btn").classList.remove("active");
        renderTabs();
        renderFileContent(idx);

        // Highlight active tree item.
        const f = COVERAGE_DATA.files[idx];
        document.querySelectorAll(".tree-item").forEach(function (el) {
          el.classList.toggle("active", el.dataset.path === f.path);
        });

        // Expand ancestor directories so the item is visible.
        const parts = f.path.split("/");
        for (let i = 1; i < parts.length; i++) {
          const dirPath = parts.slice(0, i).join("/");
          expandedDirs.add(dirPath);
        }
        // Re-render tree to reflect expanded state.
        const treeEl = document.getElementById("tree");
        treeEl.innerHTML = "";
        treeEl.appendChild(renderTreeNode(TREE, "", 0));
        // Re-apply active class after re-render.
        document.querySelectorAll(".tree-item").forEach(function (el) {
          el.classList.toggle("active", el.dataset.path === f.path);
        });

        updateStatus(f.path, "Python  ·  " + f.source.length + " lines");
        history.replaceState(null, "", "#file-" + idx);
      }

      function renderFileContent(idx) {
        const f = COVERAGE_DATA.files[idx];
        const parts = f.path.split("/");

        const ls = lineStats(f);
        function linePct(n) {
          return ls.total ? ((n / ls.total) * 100).toFixed(1) + "%" : "0.0%";
        }

        // Breadcrumb row: path on the left, per-category stat badges on the right.
        let crumb = '<div class="breadcrumb">';
        crumb +=
          '<span class="breadcrumb-path">📁 <span>' +
          parts.map(escHtml).join("</span> / <span>") +
          "</span></span>";
        crumb +=
          '<span class="stat-badge sb-precise">' +
          linePct(ls.precise) +
          " precise</span>";
        crumb +=
          '<span class="stat-badge sb-imprecise">' +
          linePct(ls.imprecise) +
          " imprecise</span>";
        crumb +=
          '<span class="stat-badge sb-dynamic">' +
          linePct(ls.dynamic) +
          " dynamic</span>";
        if (COVERAGE_DATA.show_todo) {
          crumb +=
            '<span class="stat-badge sb-todo">' +
            linePct(ls.todo) +
            " todo</span>";
        }
        crumb +=
          '<span class="stat-badge sb-empty">' +
          linePct(ls.empty) +
          " empty</span>";
        crumb += "</div>";

        const LINE_CLASSES = [
          "",
          "line-precise",
          "line-imprecise",
          "line-dynamic",
          "line-todo",
        ];

        // Source table.
        let rows = "";
        f.source.forEach(function (line, i) {
          const cls = LINE_CLASSES[f.line_classes[i]] || "";
          const n = i + 1;
          rows += '<tr class="' + cls + '">';
          rows +=
            '<td class="lineno"><a id="L' +
            n +
            '" href="#L' +
            n +
            '">' +
            n +
            "</a></td>";
          rows += '<td class="code">' + escHtml(line) + "</td>";
          rows += "</tr>";
        });

        document.getElementById("content-area").innerHTML =
          crumb + '<table class="source"><tbody>' + rows + "</tbody></table>";
      }

      function closeTab(idx) {
        openTabs = openTabs.filter(function (i) {
          return i !== idx;
        });
        if (activeView === idx) {
          if (openTabs.length > 0) {
            openFile(openTabs[openTabs.length - 1]);
          } else {
            showSummary();
          }
          return;
        }
        renderTabs();
      }

      function updateStatus(left, right) {
        document.getElementById("status-left").textContent = left;
        document.getElementById("status-right").textContent = right;
      }

      document.getElementById("tree").appendChild(renderTreeNode(TREE, "", 0));

      (function () {
        const hash = location.hash;
        const m = hash.match(/^#file-(\d+)$/);
        if (m) {
          const idx = parseInt(m[1], 10);
          if (idx >= 0 && idx < COVERAGE_DATA.files.length) {
            openFile(idx);
            return;
          }
        }
        showSummary();
      })();
    </script>
  </body>
</html>
