[package]
name = "ruff_python_dto_check"
version = "0.1.0"
publish = false
edition = "2024"
rust-version = "1.86"
description = "Config-driven extractor over ruff_python_parser. Harvests structured DTO/route/handler facts from a Python source tree into JSON bundles, with a preflight that proposes a config from the tree itself. Additive consumer; touches no other crate."
license = "MIT"

[lib]
name = "ruff_python_dto_check"

[[bin]]
name = "ruff-py-dto"
path = "src/bin/ruff_py_dto.rs"

[dependencies]
ruff_python_ast = { workspace = true }
ruff_python_parser = { workspace = true }
ruff_source_file = { workspace = true }
ruff_text_size = { workspace = true }

anyhow = { workspace = true }
clap = { workspace = true }
globset = { workspace = true }
regex = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { version = "0.10.9" }
walkdir = { workspace = true }

[lints]
workspace = true
